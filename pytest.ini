[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test

# Busca tests en estas rutas
testpaths = tests apps

# Convenciones de nombres de archivos y funciones de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Muestra los 10 tests más lentos al final de cada ejecución
addopts =
    --strict-markers
    -v
    --tb=short

# Marcadores personalizados para organizar los tests (ver Fase 6)
markers =
    unit: Tests unitarios (sin BD)
    integration: Tests de integración (con BD)
    auth: Tests del sistema de autenticación
    permissions: Tests de permisos RBAC
    performance: Tests de performance y carga
